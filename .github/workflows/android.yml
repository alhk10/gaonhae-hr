name: Build Android APK

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Verify debug APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          file "$APK"
          BT_DIR="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/*/ | sort -V | tail -1)"
          echo "Using build-tools: $BT_DIR"
          "${BT_DIR}apksigner" verify --verbose --print-certs "$APK"
          "${BT_DIR}aapt" dump badging "$APK" | head -40

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmsBridge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to rolling GitHub Release
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android debug APK (latest)
          body: |
            Rolling debug build of the SMS Bridge Android app.
            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: "false"

